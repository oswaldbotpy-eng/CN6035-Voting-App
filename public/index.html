<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta
      name="description"
      content="AlgoVote — A decentralised voting platform built on the Algorand blockchain. Create elections, register to vote, and view live on-chain results."
    />

    <!-- Open Graph / Social Preview -->
    <meta property="og:title" content="AlgoVote — Decentralised Voting" />
    <meta
      property="og:description"
      content="Create and participate in transparent, tamper-proof elections on the Algorand blockchain."
    />
    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- 
      Google Fonts
      - Syne: bold, geometric display font for headings
      - DM Mono: clean monospace for addresses and blockchain data
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <title>AlgoVote — Decentralised Voting</title>

    <style>
      /* 
        Global CSS variables — single source of truth for the design system.
        These are used across all styled-components and inline styles.
      */
      :root {
        --color-bg: #0a0a0f;
        --color-surface: #13131a;
        --color-border: #1e1e2e;
        --color-primary: #7c6aff;
        --color-primary-hover: #6355e0;
        --color-accent: #ff7a3d;
        --color-accent-hover: #e8622a;
        --color-success: #3dffb0;
        --color-danger: #ff4d6d;
        --color-text: #e8e8f0;
        --color-text-muted: #6e6e8a;
        --font-display: "Syne", sans-serif;
        --font-mono: "DM Mono", monospace;
        --radius: 12px;
        --radius-sm: 6px;
        --transition: 0.2s ease;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-display);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      /* Bootstrap modal dark theme override */
      .modal-content {
        background-color: var(--color-surface) !important;
        border: 1px solid var(--color-border) !important;
        border-radius: var(--radius) !important;
        color: var(--color-text) !important;
      }

      .modal-header {
        border-bottom: 1px solid var(--color-border) !important;
      }

      .modal-footer {
        border-top: 1px solid var(--color-border) !important;
      }

      .btn-close {
        filter: invert(1);
      }

      /* Table dark theme override */
      .table {
        color: var(--color-text) !important;
        border-color: var(--color-border) !important;
      }

      .table-striped > tbody > tr:nth-of-type(odd) > * {
        background-color: rgba(124, 106, 255, 0.05) !important;
        color: var(--color-text) !important;
      }

      /* Selection colour */
      ::selection {
        background: var(--color-primary);
        color: white;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AlgoVote.</noscript>
    <div id="root"></div>
  </body>
</html>
